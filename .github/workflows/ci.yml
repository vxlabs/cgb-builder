name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18.x', '20.x', '22.x']

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test --if-present

      - name: Lint (if eslint is configured)
        run: npx eslint src --ext .ts --max-warnings 0 || true

  smoke-test:
    name: Smoke Test — cgb init + cgb stats
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Install cgb globally from local build
        run: npm install -g .

      - name: Run cgb init on this repo
        run: cgb init .

      - name: Check graph was created
        run: test -f .cgb/graph.db

      - name: Print stats
        run: cgb stats
